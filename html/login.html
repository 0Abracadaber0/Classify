<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classify</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="shortcut icon" href="../img/Logo_BNTU.png"/>
    
</head>

<body>

    <nav class="nav --none-fixed">
        <div class="container">
            <div class="nav-row">
                <a href=index.html class="logo"> <strong>Classify</strong> </a>
                
                
                <ul class="nav-list">
                    <li class="nav-list__item"><a href="../html/index.html" class="nav-list__link">Projects</a></li>
                    <li class="nav-list__item"><a href="../html/contacts.html" class="nav-list__link">Contacts</a></li>
                    <li class="nav-list__item"><a href="../html/login.html" class="nav-list__link  nav-list__link--active">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="login">
        <div class="container">

            <div class="wrapper-login">

                <form action="">
                    <h1>Login</h1>
                    <div class="input-box">
                        <input type="text" placeholder="Username" required>
                        <img src="../img/png/user.png" alt="login-image">
                    </div>

                    <div class="input-box">
                        <input type="password" placeholder="Password" required>
                        <img src="../img/png/lock.png" alt="login-image">
                    </div>

                    <div class="remember">
                        <label for=""><input type="checkbox">Remember me</label>
                        <a href="#">Forgot password ?</a>
                    </div>

                    <button type="submit" class="btn">Login</button>

                    <div class="register-link">
                        <p>Don't have an account? <a class="nav-list__link" href="#">Register</a></p>
                    </div>
                    
                </form>
            </div>

        </div>
    </div>


    <footer class="footer">
        <div class="container">
            <div class="footer__wrapper">
                <ul class="social">
                    <li class="social__item">
                        <a href="#!"><img src="../img/icons/vk.svg" alt="link"></a>
                    </li>
                    <li class="social__item">
                        <a href="#!"><img src="../img/icons/gitHub.svg" alt="link"></a>
                    </li>
                </ul>
                <div class="copyright">
                    <p>© 2024 classify.com</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
